<!DOCTYPEhtml>
<html>
<head>
<tittle<login validation</title>
<script>
	function checkValue()
	{
		let user=document.getElementById("user").value;
		let pattern=/\w+@\w+\.\w+/;
		let pass=document.getElementById("pass").value
		if(!pattern.test(user))
		{
			document.getElementById("p1").innerHTML="invalid mail format";
		}
		if(!(pass.length <=8 && pass.length>=5))
		{
			document.getElementById("p2").innerHTML="password must 6-8 numbers";
		}
		if(pattern.test(user) && (pass.length <=8 && pass.length >=5))
		{
			document.getElementById("p3").innerHTML="login success";
		}
	}
</script>
</head>
<body>
	username:<input type="text" id="user" placeholder="UserName"><br><br>
	<p id="p1"></p><br>
	password:<input typr="password" id="pass" placeholder="password"><br><br>
	<p id="p2"></p><br>
	<button onclick=checkValue()>submit</button>
	<p id="p3"></p><br><br>
</body>
</html>
